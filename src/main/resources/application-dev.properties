# ============================================================
# 数据源配置 (PostgreSQL)
# ============================================================
# 通过环境变量注入，开发默认值仅用于本地
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aips}
spring.datasource.username=${DB_USERNAME:aips}
spring.datasource.password=${DB_PASSWORD:aips123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate 配置
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# ============================================================
# SQL 初始化
# ============================================================
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ============================================================
# JWT 配置（生产务必替换 secret）
# ============================================================
jwt.secret=${JWT_SECRET:aips-jwt-secret-key-for-development-only-min-256bits!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:7200000}

# ============================================================
# 日志配置
# ============================================================
logging.level.com.needhelp.aips=DEBUG
logging.level.org.springframework.security=INFO

# ============================================================
# DeepSeek LLM 配置（兼容 OpenAI 格式）
# ============================================================
openai.api-key=${LLM_API_KEY:sk-your-api-key-here}
openai.api-url=${LLM_API_URL:https://api.deepseek.com}
openai.model=${LLM_MODEL:deepseek-v4-flash}
openai.reasoning-effort=${LLM_REASONING_EFFORT:medium}
openai.timeout-seconds=${LLM_TIMEOUT:30}
