# ============================================================
# 数据源配置 (PostgreSQL)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/aips
spring.datasource.username=aips
spring.datasource.password=aips123
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate 配置
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JWT 配置
# ============================================================
jwt.secret=aips-jwt-secret-key-for-development-only-min-256bits!!
jwt.expiration-ms=7200000

# ============================================================
# 日志配置
# ============================================================
logging.level.com.needhelp.aips=DEBUG
logging.level.org.springframework.security=INFO
