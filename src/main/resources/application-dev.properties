spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aips}
spring.datasource.username=${DB_USERNAME:aips}
spring.datasource.password=${DB_PASSWORD:aips123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

jwt.secret=${JWT_SECRET:aips-jwt-secret-key-for-development-only-min-256bits!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:7200000}

logging.level.com.needhelp.aips=DEBUG
logging.level.org.springframework.security=INFO

# LangChain4j — DeepSeek
langchain4j.open-ai.chat-model.api-key=${LLM_API_KEY:sk-your-api-key-here}
langchain4j.open-ai.chat-model.base-url=https://api.deepseek.com
langchain4j.open-ai.chat-model.model-name=${LLM_MODEL:deepseek-v4-flash}
langchain4j.open-ai.chat-model.temperature=0.7
langchain4j.open-ai.chat-model.max-tokens=1024
langchain4j.open-ai.chat-model.timeout=30s
