# ============================================================
# 数据源配置 (PostgreSQL)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/aips
spring.datasource.username=aips
spring.datasource.password=aips123
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate 配置
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# ============================================================
# SQL 初始化
# ============================================================
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ============================================================
# JWT 配置
# ============================================================
jwt.secret=aips-jwt-secret-key-for-development-only-min-256bits!!
jwt.expiration-ms=7200000

# ============================================================
# 日志配置
# ============================================================
logging.level.com.needhelp.aips=DEBUG
logging.level.org.springframework.security=INFO

# ============================================================
# DeepSeek LLM 配置（兼容 OpenAI 格式）
# ============================================================
# 从 https://platform.deepseek.com 获取 API Key
openai.api-key=sk-your-deepseek-api-key
# API 地址
openai.api-url=https://api.deepseek.com
# 模型选择：
#   deepseek-v4-flash — 快速模式，适合简单咨询
#   deepseek-v4-pro  — 推理模式（think 链），适合复杂用药分析
openai.model=deepseek-v4-flash
# 推理深度（仅 deepseek-v4-pro 生效）：low / medium / high
openai.reasoning-effort=medium
# 请求超时（秒）
openai.timeout-seconds=30
