spring.application.name=AIPS-test

spring.datasource.url=jdbc:h2:mem:aips_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=never

jwt.secret=aips-jwt-secret-key-for-testing-only-min-256bits!!!
jwt.expiration-ms=3600000

logging.level.com.needhelp.aips=DEBUG
